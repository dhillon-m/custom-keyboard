CONFIG_ZMK_SPLIT=y
# BLE is the default transport for nice_nano_v2; no explicit ZMK_SPLIT_BLE needed.
# Omitting ZMK_SPLIT_ROLE_CENTRAL means this device acts as the peripheral.

CONFIG_ZMK_BATTERY_REPORTING=y

CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
# The battery widget on a split peripheral shows the central's battery level.
# If you want both batteries displayed simultaneously, a custom LVGL widget
# will be needed (see ZMK docs on custom display widgets).
